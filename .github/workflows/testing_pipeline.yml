name: Testing stuff

on:
  push:
    branches:
      - main

jobs:
  a_test_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: commits
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: echo "$COMMITS"
      - name: commit messages
        env:
          COMMIT_MESSAGES: ${{ toJson(github.event.commits.*.message) }}
        run: echo "$COMMIT_MESSAGES"
      - name: joining commits to one string
        env:
          COMMIT_COMBINED_STRING: ${{ join(toJson(github.event.commits.*.message), ', ')  }}
        run: echo "$COMMIT_COMBINED_STRING"
      - name: checking if the joined commits have skip, reusing variable
        env:
          COMMIT_CONTAINS_SKIP_REUSE_VAR: ${{ contains($COMMIT_COMBINED_STRING, "#skip")}}
        run: echo "$COMMIT_CONTAINS_SKIP_REUSE_VAR"
      - name: checking if the joined commits have skip, not reusing variable
        env:
          COMMIT_CONTAINS_SKIP: ${{ contains(join(toJson(github.event.commits.*.message), ', '), "#skip")  }}
        run: echo "$COMMIT_CONTAINS_SKIP"
