name: Periodic health check

on:
  workflow_dispatch:
  schedule:
    - cron: '1 1 1 * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check the deployed service URL
        uses: jtalk/url-health-check-action@v5
        with:
          url: https://fso-ci.onrender.com/hp